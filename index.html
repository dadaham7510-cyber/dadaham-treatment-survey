<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #f6f8f5;
  --card: #ffffff;
  --text: #1f2a24;
  --muted: #6b756f;
  --line: #dfe7e1;
  --green: #10b981;
  --green-dark: #047857;
  --green-soft: #dff7ec;
  --amber: #f59e0b;
  --red: #ef4444;
  --shadow: 0 20px 60px rgba(31, 42, 36, 0.10);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 34rem),
    linear-gradient(180deg, #fbfdfb 0%, var(--bg) 100%);
  color: var(--text);
}

.app {
  min-height: 100vh;
  padding: 32px 18px 56px;
}

.container {
  width: min(760px, 100%);
  margin: 0 auto;
}

.hero {
  margin-bottom: 22px;
  padding: 28px;
  border: 1px solid rgba(16, 185, 129, 0.18);
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.78);
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}

.brand {
  margin: 0 0 10px;
  color: var(--green-dark);
  font-size: 15px;
  font-weight: 900;
  letter-spacing: -0.02em;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--green-soft);
  color: var(--green-dark);
  font-size: 13px;
  font-weight: 700;
}

h1 {
  margin: 0 0 12px;
  font-size: clamp(28px, 6vw, 42px);
  line-height: 1.15;
  letter-spacing: -0.04em;
}

.lead {
  margin: 0;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.75;
}

.notice {
  margin-top: 18px;
  padding: 14px 16px;
  border-radius: 18px;
  background: #fff7ed;
  color: #9a3412;
  font-size: 14px;
  line-height: 1.6;
}

.form-card {
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: 28px;
  background: var(--card);
  box-shadow: var(--shadow);
}

.progress-wrap {
  margin-bottom: 22px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.progress-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #edf2ee;
}

.progress-bar {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--green), #34d399);
  transition: width 0.25s ease;
}

.question {
  padding: 18px 0;
  border-top: 1px solid #edf2ee;
}

.question:first-of-type {
  border-top: 0;
  padding-top: 0;
}

.label {
  display: block;
  margin-bottom: 10px;
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.required {
  color: var(--red);
}

.help {
  margin: -4px 0 12px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

input:not([type="checkbox"]),
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fbfdfb;
  color: var(--text);
  font: inherit;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

input:not([type="checkbox"]) {
  height: 48px;
  padding: 0 14px;
}

.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fbfdfb;
  color: var(--text);
  line-height: 1.55;
  cursor: pointer;
}

.checkbox-row input {
  width: 18px;
  height: 18px;
  margin-top: 3px;
  accent-color: var(--green);
  flex: 0 0 auto;
}

.checkbox-text {
  font-size: 14px;
  color: var(--text);
}

textarea {
  min-height: 112px;
  padding: 14px;
  resize: vertical;
  line-height: 1.65;
}

input:not([type="checkbox"]):focus,
textarea:focus {
  border-color: rgba(16, 185, 129, 0.8);
  background: #ffffff;
  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
}

.score-row {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  gap: 6px;
}

.score-button {
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fbfdfb;
  color: var(--muted);
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s ease;
}

.score-button:hover {
  border-color: var(--green);
  color: var(--green-dark);
}

.score-button.active {
  border-color: var(--green);
  background: var(--green);
  color: white;
}

.score-caption {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
}

.actions {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}

.submit {
  flex: 1;
  height: 54px;
  border: 0;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--green), var(--green-dark));
  color: white;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 14px 32px rgba(16, 185, 129, 0.28);
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.submit:hover:not(:disabled) {
  transform: translateY(-1px);
}

.submit:disabled {
  cursor: not-allowed;
  opacity: 0.58;
}

.reset {
  height: 54px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: white;
  color: var(--muted);
  font-weight: 800;
  cursor: pointer;
}

.message {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
}

.message.success {
  background: var(--green-soft);
  color: var(--green-dark);
}

.message.error {
  background: #fee2e2;
  color: #991b1b;
}

.footer {
  margin-top: 18px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
  text-align: center;
}

@media (max-width: 560px) {
  .app {
    padding: 18px 12px 42px;
  }

  .hero,
  .form-card {
    border-radius: 22px;
    padding: 20px;
  }

  .score-row {
    grid-template-columns: repeat(6, 1fr);
  }

  .actions {
    flex-direction: column;
  }

  .submit,
  .reset {
    width: 100%;
  }
}
</style>
